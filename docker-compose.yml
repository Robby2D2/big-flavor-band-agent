services:
  # PostgreSQL database with pgvector extension
  postgres:
    image: ankane/pgvector:latest
    container_name: bigflavor-postgres
    environment:
      POSTGRES_DB: bigflavor
      POSTGRES_USER: bigflavor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bigflavor_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigflavor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bigflavor-network
    restart: unless-stopped

  # Ollama - Local LLM Server (optional, for cost savings)
  ollama:
    image: ollama/ollama:latest
    container_name: bigflavor-ollama
    ports:
      - "11434:11434"  # Expose Ollama API to host
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - bigflavor-network
    restart: unless-stopped
    # GPU support enabled (NVIDIA RTX 3090)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # Python FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bigflavor-backend
    environment:
      # Dev context: allows DatabaseManager's dev password default when DB_PASSWORD is unset.
      - APP_ENV=development
      - DATABASE_URL=postgresql://bigflavor:${POSTGRES_PASSWORD:-bigflavor_dev_pass}@postgres:5432/bigflavor
      # Individual DB vars for DatabaseManager
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=bigflavor
      - DB_USER=bigflavor
      - DB_PASSWORD=${POSTGRES_PASSWORD:-bigflavor_dev_pass}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Shared secret the BFF must present to reach protected backend routes
      - BACKEND_API_SECRET=${BACKEND_API_SECRET:-}
      # LLM Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=http://ollama:11434
      # Honour OLLAMA_MODEL from the env file; default to the 14B tool-calling model.
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
    volumes:
      - ./audio_library:/app/audio_library:ro
      # Writable output dir for auto-clean, nested under the read-only catalog
      # mount above so cleaned files can be written without exposing originals.
      - ./audio_library/produced:/app/audio_library/produced
      # Mount source code for hot reloading (restart instead of rebuild)
      - ./src:/app/src:ro
      - ./database:/app/database:ro
      - ./backend_api.py:/app/backend_api.py:ro
      # Shared playlist directory for Liquidsoap integration
      - ./streaming/playlist:/app/streaming/playlist
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - bigflavor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend.dev
    container_name: bigflavor-frontend
    environment:
      - NODE_ENV=development
      - AGENT_API_URL=http://backend:8000
      - BACKEND_API_SECRET=${BACKEND_API_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      # Mount source code for hot reloading
      - ./frontend/app:/app/app:ro
      - ./frontend/components:/app/components:ro
      - ./frontend/lib:/app/lib:ro
      - ./frontend/public:/app/public:ro
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bigflavor-network
    restart: unless-stopped

  # Icecast Streaming Server
  icecast:
    image: moul/icecast
    container_name: bigflavor-icecast
    environment:
      - ICECAST_SOURCE_PASSWORD=bigflavor_source
      - ICECAST_ADMIN_PASSWORD=bigflavor_admin
      - ICECAST_RELAY_PASSWORD=bigflavor_relay
      - ICECAST_HOSTNAME=bigflavor.useunix.com
      - ICECAST_MAX_CLIENTS=100
      - ICECAST_MAX_SOURCES=2
    ports:
      - "8001:8000"  # Expose on 8001 to avoid conflicts
    networks:
      - bigflavor-network
    restart: unless-stopped

  # Liquidsoap Audio Streamer
  liquidsoap:
    build:
      context: .
      dockerfile: Dockerfile.liquidsoap
    container_name: bigflavor-liquidsoap
    volumes:
      - ./audio_library:/audio_library:ro
      - ./streaming/playlist:/playlist:ro
      - liquidsoap_logs:/var/log/liquidsoap
    depends_on:
      - icecast
    networks:
      - bigflavor-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: bigflavor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - icecast
    networks:
      - bigflavor-network
    restart: unless-stopped
    healthcheck:
      # Use 127.0.0.1, not localhost - musl/alpine resolves localhost to ::1
      # first and nginx.conf only binds IPv4, so the IPv6 attempt always
      # fails with "connection refused" even while nginx is serving fine.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bigflavor-network:
    driver: bridge

volumes:
  postgres_data:
  nginx_logs:
  ollama_data:
  icecast_logs:
  liquidsoap_logs:
